# ============================================================
# BikeNet - Local Development Stack
# All microservices + databases + message broker + API gateway
#
# Usage:
#   1. Run: bash scripts/setup.sh
#   2. Edit .env with your Google OAuth and mail credentials
#   3. Run: docker compose up --build
#   4. Run frontend: cd frontend/bicycle-network-frontend && npm run dev
#   5. Open: http://localhost:8080
# ============================================================

services:

  # ================================================================
  # API GATEWAY (nginx) - Single entry point on port 8080
  # ================================================================
  api-gateway:
    image: nginx:alpine
    container_name: bikenet-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-service:
        condition: service_started
      bicycle-service:
        condition: service_started
      rental-service:
        condition: service_started
      events-service:
        condition: service_started
      geolocation-service:
        condition: service_started
    networks:
      - bikenet
    restart: unless-stopped

  # ================================================================
  # AUTH SERVICE (Python - FastAPI)
  # ================================================================
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass_local
      POSTGRES_DB: auth_db
      DATABASE_URL: postgresql://auth_user:auth_pass_local@auth-postgres:5432/auth_db
      ALGORITHM: RS256
      # SECRET_KEY is set in docker-compose.override.yml (generated by scripts/setup.sh)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      GOOGLE_REDIRECT_URI: http://localhost:8080/auth/google/callback
      FRONTEND_URL: http://localhost:8080
      MAIL_USERNAME: ${MAIL_USERNAME:-test@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-testpassword}
      MAIL_FROM: ${MAIL_FROM:-test@example.com}
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - bikenet
    restart: unless-stopped

  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass_local
      POSTGRES_DB: auth_db
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bikenet

  # ================================================================
  # BICYCLE SERVICE (Python - FastAPI)
  # ================================================================
  bicycle-service:
    build: ./bicycle-service
    container_name: bicycle-service
    environment:
      DATABASE_URL: postgresql://bikes_user:bikes_pass_local@bicycle-postgres:5432/bikes_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # JWT_PUBLIC_KEY is set in docker-compose.override.yml (generated by scripts/setup.sh)
      JWT_ALGORITHM: RS256
      DISABLE_AUTH: "false"
      RUN_MIGRATIONS: "true"
    depends_on:
      bicycle-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bikenet
    restart: unless-stopped

  bicycle-postgres:
    image: postgres:15-alpine
    container_name: bicycle-postgres
    environment:
      POSTGRES_USER: bikes_user
      POSTGRES_PASSWORD: bikes_pass_local
      POSTGRES_DB: bikes_db
    volumes:
      - bicycle_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bikes_user -d bikes_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bikenet

  # ================================================================
  # RENTAL SERVICE (Go - Gin)
  # ================================================================
  rental-service:
    build: ./rental-service
    container_name: rental-service
    environment:
      DATABASE_URL: postgresql://rental_user:rental_pass_local@rental-postgres:5432/rental_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # JWT_PUBLIC_KEY is set in docker-compose.override.yml (generated by scripts/setup.sh)
      JWT_ALGORITHM: RS256
      APP_PORT: "8002"
      DISABLE_AUTH: "false"
      RUN_MIGRATIONS: "true"
    depends_on:
      rental-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bikenet
    restart: unless-stopped

  rental-postgres:
    image: postgres:15-alpine
    container_name: rental-postgres
    environment:
      POSTGRES_USER: rental_user
      POSTGRES_PASSWORD: rental_pass_local
      POSTGRES_DB: rental_db
    volumes:
      - rental_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental_user -d rental_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bikenet

  # ================================================================
  # EVENTS SERVICE (Python - FastAPI)
  # ================================================================
  events-service:
    build: ./events-microservice
    container_name: events-service
    environment:
      DATABASE_URL: postgresql://events_user:events_pass_local@events-postgres:5432/events_db
    depends_on:
      events-postgres:
        condition: service_healthy
    networks:
      - bikenet
    restart: unless-stopped

  events-postgres:
    image: postgres:15-alpine
    container_name: events-postgres
    environment:
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: events_pass_local
      POSTGRES_DB: events_db
    volumes:
      - events_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events_user -d events_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bikenet

  # ================================================================
  # GEOLOCATION SERVICE (Python - FastAPI)
  # ================================================================
  geolocation-service:
    build: ./geolocation
    container_name: geolocation-service
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: geolocation_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE_LIFECYCLE: bike_lifecycle_events
      RABBITMQ_QUEUE_LOCATION: bike_location_events
      API_PREFIX: /api/v1
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - bikenet
    restart: unless-stopped

  # ================================================================
  # SHARED INFRASTRUCTURE
  # ================================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bikenet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "15672:15672"   # Management UI (http://localhost:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bikenet

  mongodb:
    image: mongo:7
    container_name: bikenet-mongodb
    volumes:
      - mongo_data:/data/db
    networks:
      - bikenet

# ================================================================
# VOLUMES (persistent data)
# ================================================================
volumes:
  auth_pgdata:
  bicycle_pgdata:
  rental_pgdata:
  events_pgdata:
  rabbitmq_data:
  mongo_data:

# ================================================================
# NETWORK
# ================================================================
networks:
  bikenet:
    driver: bridge
