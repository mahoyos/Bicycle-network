upstream frontend {
    server host.docker.internal:5173;
}

upstream auth_service {
    server auth-service:8000;
}

upstream bicycle_service {
    server bicycle-service:8000;
}

upstream rental_service {
    server rental-service:8002;
}

upstream events_service {
    server events-service:8000;
}

upstream geolocation_service {
    server geolocation-service:8000;
}

server {
    listen 80;
    server_name localhost;

    # ---- Max body size for uploads ----
    client_max_body_size 10M;

    # ---- CORS headers (handled by the gateway) ----
    add_header Access-Control-Allow-Origin  "http://localhost:5173" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ---- Auth Service ----
    location /auth/ {
        proxy_pass         http://auth_service/auth/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie $http_cookie;
        proxy_pass_header  Set-Cookie;
    }

    # ---- Bicycle Service ----
    location /bikes {
        proxy_pass         http://bicycle_service/bikes;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Rental Service ----
    location /rentals {
        proxy_pass         http://rental_service/rentals;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Events Service ----
    location /events {
        proxy_pass         http://events_service/events;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Events Service - User registrations ----
    location /users/ {
        proxy_pass         http://events_service/users/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Geolocation Service ----
    location /api/v1/ {
        proxy_pass         http://geolocation_service/api/v1/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Health endpoints (aggregated) ----
    location = /health/auth {
        proxy_pass http://auth_service/health;
    }
    location = /health/bikes {
        proxy_pass http://bicycle_service/health;
    }
    location = /health/rentals {
        proxy_pass http://rental_service/health;
    }
    location = /health/events {
        proxy_pass http://events_service/;
    }
    location = /health/geolocation {
        proxy_pass http://geolocation_service/health;
    }

    # ---- Frontend (Vite dev server) ----
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_http_version 1.1;
    }
}
