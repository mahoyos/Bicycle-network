apiVersion: batch/v1
kind: Job
metadata:
  name: auth-service-migration
  namespace: bicycle-network
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: 628786078121.dkr.ecr.us-east-1.amazonaws.com/auth-service:latest
          command: ["python", "-c", "from app.core.database import engine; from app.models.user import Base; Base.metadata.create_all(bind=engine)"]
          envFrom:
            - secretRef:
                name: auth-service-secrets
