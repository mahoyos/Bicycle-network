apiVersion: batch/v1
kind: Job
metadata:
  name: bicycle-service-migration
  namespace: bicycle-network
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/bicycle-service:latest
          command: ["python", "-c", "import asyncio; from app.database.connection import init_db; asyncio.run(init_db())"]
          envFrom:
            - secretRef:
                name: bicycle-service-secrets
          env:
            - name: RUN_MIGRATIONS
              value: "true"
