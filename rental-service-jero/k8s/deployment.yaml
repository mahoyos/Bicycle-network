apiVersion: apps/v1
kind: Deployment
metadata:
  name: rental-service-jero
  namespace: bicycle-network
  labels:
    app: rental-service-jero
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rental-service-jero
  template:
    metadata:
      labels:
        app: rental-service-jero
    spec:
      containers:
        - name: rental-service-jero
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/rental-service-jero:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: rental-service-jero-secrets
          env:
            - name: RUN_MIGRATIONS
              value: "false"
            - name: DISABLE_AUTH
              value: "false"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "256m"
              memory: "512Mi"
            limits:
              cpu: "512m"
              memory: "1Gi"
